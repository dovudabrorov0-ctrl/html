<!DOCTYPE html>
<html lang="ru" class="bg-[#0b0c10] text-white antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalyst Analytics</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body>

    <header class="max-w-7xl  px-6 py-0 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-[100px] h-[100px]  ">
                <img src="./src/img/Logo (3).png" alt="">
            </div>
        </div>

        <nav class="hidden md:flex items-center space-x-8 text-sm text-zinc-400 font-medium">
            <a href="#" class="text-white hover:text-white transition">Home</a>
            <a href="#" class="hover:text-white transition">Services</a>
            <a href="#" class="hover:text-white transition">Careers</a>
            <a href="#" class="hover:text-white transition">Career Details</a>
            <a href="#" class="hover:text-white transition">Contact</a>
        </nav>

        <div>
            <a href="#" class="bg-[#0084ff] hover:bg-blue-600 text-white text-sm font-semibold px-6 py-2.5 rounded-lg transition shadow-lg shadow-blue-500/20">
                Contact Us
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pt-0 pb-24 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center relative">
        
        <div class="absolute inset-0 bg-[radial-gradient(#1e293b_1px,transparent_1px)] [background-size:24px_24px] opacity-20 pointer-events-none"></div>

        <div class="z-10 max-w-xl">
            <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight leading-[1.1] mb-6">
                Transforming Data <br>
                into <span class="bg-[#0084ff] text-white px-4 py-1 rounded-2xl inline-block my-1 shadow-md">Decisions</span>
            </h1>
            
            <p class="text-zinc-400 text-base md:text-lg mb-8 leading-relaxed max-w-md">
                Leverage the power of machine learning and AI to unlock insights and drive business growth.
            </p>

            <div class="mb-10">
                <a href="#" class="bg-[#0084ff] hover:bg-blue-600 text-white font-semibold px-8 py-3.5 rounded-xl transition inline-block shadow-lg shadow-blue-500/20">
                    Book a Meeting
                </a>
            </div>

            <div class="flex items-center space-x-4">
                <div class="flex -space-x-3">
                    <img src="./src/img/Group 20.png" alt="">
                    
                </div>
                <p class="text-zinc-400 text-xs font-medium">Over 100+ clients have worked with us</p>
            </div>
        </div>

        <div class="z-10 flex justify-center ">
            <div class="absolute w-72 h-72  rounded-full blur-3xl top-[10px] left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
            
            <div class="w-[650px] aspect-square flex items-center justify-center   ">
                <img src="./src/img/robot area.png" alt="">
            </div>
        </div>
    </main>

    <div class="max-w-7xl mx-auto px-6">
        <div class="h-[1px] bg-gradient-to-r from-transparent via-zinc-800 to-transparent"></div>
    </div>

    <section class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-8 items-center justify-items-center opacity-60">
            <div class="text-xl font-bold tracking-tight text-white">
                <img src="./src/img/Card (1).png" alt="">
            </div>
            <div class="text-xl font-bold tracking-tight text-white">
                <img src="./src/img/Logo (4).png" alt="">
            </div>
            <div class="text-xl font-bold tracking-tight text-white">
                <img src="./src/img/Logo (5).png" alt="">
            </div>
            <div class="text-xl font-bold tracking-tight text-white">
                <img src="./src/img/Logo (6).png" alt="">
            </div>
            <div class="text-xl font-bold tracking-tight text-white">
                <img src="./src/img/Logo (7).png" alt="">
            </div>
            <div class="text-xl font-bold tracking-tight text-white">
                <img src="./src/img/Logo (8).png" alt="">
            </div>
        </div>
    </section>

</body>
</html>
